# ============================================================
# monitoring/prometheus/prometheus.yml
# Scrapes: app metrics, node-exporter, postgres-exporter
# ============================================================

global:
  scrape_interval:     15s   # how often to scrape
  evaluation_interval: 15s   # how often to evaluate alerting rules
  external_labels:
    monitor: '8byte-devops'
    environment: 'staging'

# ─── Alert rules file ───────────────────────────────────────
rule_files:
  - "alert_rules.yml"

# ─── Alertmanager (optional, for Slack/email) ───────────────
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

# ─── Scrape configs ─────────────────────────────────────────
scrape_configs:

  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Application metrics (Express app with prom-client)
  - job_name: 'app'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['app:3000']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  # Node Exporter — host CPU, memory, disk, network
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # PostgreSQL Exporter — DB metrics
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']

  # cAdvisor — container resource metrics
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
